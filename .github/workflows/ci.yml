name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    name: ${{ matrix.os }} · node-${{ matrix.node }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # macos-latest and windows-latest dropped for MVP — see npm/cli#4828
        # (cross-platform optional-dep resolution). End-user installs on
        # those platforms are unaffected; the issue is CI-specific.
        os: [ubuntu-latest]
        node: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - name: Install deps
        run: npm ci
      - name: KB layout tests
        run: npm run validate
